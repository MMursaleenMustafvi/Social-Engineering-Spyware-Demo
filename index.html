<!DOCTYPE html>
<html lang="en">

<head>
    <title>Jawline Score Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="container">

        <div class="badge">AI-Powered</div>
        <h1>Jawline<br><span>Score Checker</span></h1>
        <p class="subtitle">Advanced facial analysis using your camera</p>

        <div class="warning">
            <span class="warning-icon">⚠</span>
            <span>This tool accesses your <strong>camera</strong> and <strong>location</strong>. Only grant permissions to trusted websites.</span>
        </div>

        <div class="video-wrapper">
            <video id="video" autoplay muted></video>
            <div class="video-corner tl"></div>
            <div class="video-corner tr"></div>
            <div class="video-corner bl"></div>
            <div class="video-corner br"></div>
            <div class="scan-line"></div>
        </div>

        <button id="startBtn">
            <span class="btn-icon">◎</span>
            Start Jawline Analysis
        </button>

        <div class="result-area">
            <p id="status"></p>
            <p id="score"></p>
        </div>

    </div>

    <footer>
        <div class="footer-inner">
            <span class="footer-label">Developed by</span>
            <a href="https://www.linkedin.com/in/muhammadmursaleenmustafvi/" target="_blank" rel="noopener noreferrer" class="footer-link">
                <svg class="linkedin-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
                Muhammad Mursaleen Mustafvi
            </a>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
